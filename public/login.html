<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DriverConnect — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    .input-field {
      width: 100%; border: 1.5px solid #e2e8f0; border-radius: 12px;
      padding: 11px 14px; font-size: 14px; color: #0f172a;
      background: #fff; transition: border-color .15s; box-sizing: border-box;
    }
    .input-field:focus { outline: none; border-color: #F59E0B; box-shadow: 0 0 0 3px rgba(245,158,11,.12); }
    .input-field::placeholder { color: #94a3b8; }
    .btn-primary {
      width: 100%; padding: 12px; border-radius: 12px;
      background: #F59E0B; color: #fff; font-size: 15px; font-weight: 700;
      border: none; cursor: pointer; transition: background .15s;
    }
    .btn-primary:hover { background: #D97706; }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .btn-google {
      width: 100%; padding: 11px; border-radius: 12px;
      background: #fff; color: #374151; font-size: 14px; font-weight: 600;
      border: 1.5px solid #e2e8f0; cursor: pointer; transition: background .12s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-google:hover { background: #f8fafc; }
    .error-box {
      background: #FEF2F2; border: 1px solid #FECACA; color: #991B1B;
      border-radius: 10px; padding: 10px 14px; font-size: 13px;
      display: none; margin-bottom: 16px;
    }
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 16px 0; color: #94a3b8; font-size: 13px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #e2e8f0;
    }
    .fade-in { animation: fi .3s ease both; }
    @keyframes fi { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body style="min-height:100vh;background:#f8fafc;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px">

  <!-- Logo link -->
  <a href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:28px">
    <div style="width:34px;height:34px;border-radius:10px;background:#F59E0B;display:flex;align-items:center;justify-content:center">
      <svg style="width:18px;height:18px;color:#fff" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
      </svg>
    </div>
    <span style="font-size:17px;font-weight:800;color:#0f172a;letter-spacing:-.3px">DriverConnect</span>
  </a>

  <!-- Card -->
  <div class="fade-in" style="background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,.08);border:1px solid #e2e8f0;width:100%;max-width:400px;padding:32px">

    <!-- Mode toggle -->
    <div style="display:flex;background:#f1f5f9;border-radius:12px;padding:4px;margin-bottom:28px">
      <button id="tab-signin" onclick="setMode('signin')"
        style="flex:1;padding:8px;border-radius:9px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .15s;background:#fff;color:#0f172a;box-shadow:0 1px 4px rgba(0,0,0,.08)">
        Sign In
      </button>
      <button id="tab-signup" onclick="setMode('signup')"
        style="flex:1;padding:8px;border-radius:9px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .15s;background:transparent;color:#64748b">
        Create Account
      </button>
    </div>

    <h1 id="form-title" style="font-size:22px;font-weight:800;color:#0f172a;margin-bottom:6px">Welcome back</h1>
    <p  id="form-sub"   style="font-size:14px;color:#64748b;margin-bottom:24px">Sign in to your DriverConnect account</p>

    <!-- Error -->
    <div id="error-box" class="error-box"></div>

    <!-- Google Sign In -->
    <button class="btn-google" onclick="signInWithGoogle()" id="google-btn">
      <svg style="width:18px;height:18px;flex-shrink:0" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or</div>

    <!-- Email / Password form -->
    <form id="auth-form" onsubmit="handleSubmit(event)" style="display:flex;flex-direction:column;gap:14px">

      <div>
        <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px">Email address</label>
        <input type="email" id="email" class="input-field" placeholder="you@example.com" required autocomplete="email">
      </div>

      <div>
        <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px">Password</label>
        <input type="password" id="password" class="input-field" placeholder="••••••••" required autocomplete="current-password" minlength="6">
      </div>

      <!-- Confirm password (signup only) -->
      <div id="confirm-wrap" style="display:none">
        <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px">Confirm password</label>
        <input type="password" id="confirm" class="input-field" placeholder="••••••••" autocomplete="new-password" minlength="6">
      </div>

      <button type="submit" class="btn-primary" id="submit-btn" style="margin-top:4px">Sign In</button>
    </form>

    <!-- Toggle link -->
    <p style="text-align:center;font-size:13px;color:#64748b;margin-top:20px">
      <span id="toggle-text">Don't have an account?</span>
      <a href="#" id="toggle-link" onclick="toggleMode(event)"
         style="color:#F59E0B;font-weight:600;text-decoration:none;margin-left:4px">Create one</a>
    </p>

  </div>

  <p style="margin-top:20px;font-size:12px;color:#94a3b8;text-align:center">
    By continuing you agree to DriverConnect's terms of service.
  </p>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script>

let currentMode = 'signin';

// Check URL param for initial mode
const urlMode = new URLSearchParams(location.search).get('mode');
if (urlMode === 'signup') setMode('signup');

// Already logged in → go straight to dashboard
auth.onAuthStateChanged(user => { if (user) window.location.href = 'dashboard.html'; });

// ── Mode switching ─────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  const isSignup = mode === 'signup';

  // Toggle tab styles
  document.getElementById('tab-signin').style.cssText =
    `flex:1;padding:8px;border-radius:9px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .15s;` +
    (isSignup ? 'background:transparent;color:#64748b' : 'background:#fff;color:#0f172a;box-shadow:0 1px 4px rgba(0,0,0,.08)');
  document.getElementById('tab-signup').style.cssText =
    `flex:1;padding:8px;border-radius:9px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .15s;` +
    (isSignup ? 'background:#fff;color:#0f172a;box-shadow:0 1px 4px rgba(0,0,0,.08)' : 'background:transparent;color:#64748b');

  document.getElementById('form-title').textContent  = isSignup ? 'Create your account'        : 'Welcome back';
  document.getElementById('form-sub').textContent    = isSignup ? 'Start your driver profile in minutes' : 'Sign in to your DriverConnect account';
  document.getElementById('submit-btn').textContent  = isSignup ? 'Create Account'              : 'Sign In';
  document.getElementById('confirm-wrap').style.display = isSignup ? 'block' : 'none';
  document.getElementById('toggle-text').textContent = isSignup ? 'Already have an account?'   : "Don't have an account?";
  document.getElementById('toggle-link').textContent = isSignup ? 'Sign in'                    : 'Create one';
  document.getElementById('error-box').style.display = 'none';

  document.getElementById('password').autocomplete = isSignup ? 'new-password' : 'current-password';
}

function toggleMode(e) {
  e.preventDefault();
  setMode(currentMode === 'signin' ? 'signup' : 'signin');
}

// ── Error display ──────────────────────────────────────────────────
function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = msg;
  box.style.display = 'block';
}

function friendlyError(code) {
  const map = {
    'auth/invalid-email':          'Please enter a valid email address.',
    'auth/user-not-found':         'No account found with that email.',
    'auth/wrong-password':         'Incorrect password. Please try again.',
    'auth/email-already-in-use':   'An account with this email already exists. Sign in instead.',
    'auth/weak-password':          'Password must be at least 6 characters.',
    'auth/too-many-requests':      'Too many attempts. Please try again later.',
    'auth/popup-closed-by-user':   'Sign-in popup was closed. Please try again.',
    'auth/invalid-credential':     'Invalid email or password.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}

function setLoading(loading) {
  const btn = document.getElementById('submit-btn');
  const gBtn = document.getElementById('google-btn');
  btn.disabled  = loading;
  gBtn.disabled = loading;
  btn.textContent = loading ? 'Please wait…' : (currentMode === 'signup' ? 'Create Account' : 'Sign In');
}

// ── Email/password submit ──────────────────────────────────────────
async function handleSubmit(e) {
  e.preventDefault();
  document.getElementById('error-box').style.display = 'none';

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;

  if (currentMode === 'signup' && password !== confirm) {
    showError("Passwords don't match. Please try again.");
    return;
  }

  setLoading(true);
  try {
    if (currentMode === 'signup') {
      await auth.createUserWithEmailAndPassword(email, password);
    } else {
      await auth.signInWithEmailAndPassword(email, password);
    }
    // onAuthStateChanged will redirect to dashboard
  } catch (err) {
    showError(friendlyError(err.code));
    setLoading(false);
  }
}

// ── Google sign-in ─────────────────────────────────────────────────
async function signInWithGoogle() {
  document.getElementById('error-box').style.display = 'none';
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await auth.signInWithPopup(provider);
    // onAuthStateChanged will redirect
  } catch (err) {
    showError(friendlyError(err.code));
  }
}

</script>
</body>
</html>
