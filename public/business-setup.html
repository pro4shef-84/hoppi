<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Setup — DriverConnect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    :root { --ac: #F59E0B; --ac-d: #D97706; }

    .input-f {
      width: 100%; border: 1.5px solid #e2e8f0; border-radius: 12px;
      padding: 11px 14px; font-size: 14px; color: #0f172a;
      background: #fff; transition: border-color .15s; box-sizing: border-box;
    }
    .input-f:focus { outline: none; border-color: var(--ac); box-shadow: 0 0 0 3px rgba(245,158,11,.1); }
    .input-f::placeholder { color: #94a3b8; }

    .btn-primary {
      width: 100%; background: var(--ac); color: #fff; border: none; cursor: pointer;
      padding: 13px 24px; border-radius: 12px; font-size: 15px; font-weight: 700;
      transition: background .15s;
    }
    .btn-primary:hover    { background: var(--ac-d); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }

    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: #94a3b8; margin-bottom: 14px;
    }

    .card {
      background: #fff; border-radius: 20px; border: 1px solid #e2e8f0; padding: 24px 28px;
    }

    #loading-overlay {
      position: fixed; inset: 0; background: #fff;
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
  </style>
</head>
<body style="background:#f8fafc;min-height:100vh">

<!-- Loading overlay -->
<div id="loading-overlay">
  <div style="text-align:center">
    <div style="width:40px;height:40px;border-radius:12px;background:#F59E0B;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
      <svg style="width:22px;height:22px;color:#fff" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
      </svg>
    </div>
    <div style="font-size:14px;color:#94a3b8">Loading…</div>
  </div>
</div>

<!-- Nav -->
<nav style="background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:50">
  <div style="max-width:640px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:12px">
    <a href="dashboard.html"
       style="font-size:13px;font-weight:600;color:#475569;text-decoration:none;display:flex;align-items:center;gap:5px">
      ← Dashboard
    </a>
    <span style="color:#e2e8f0">|</span>
    <span style="font-size:15px;font-weight:700;color:#0f172a">🏢 Business Setup</span>
  </div>
</nav>

<div style="max-width:640px;margin:0 auto;padding:28px 16px 60px">
  <div id="page-content"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>

let currentUser     = null;
let driverProfile   = null;
let currentBusiness = null;

// ── Auth guard ────────────────────────────────────────────────────
auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;
  await loadProfile();
  document.getElementById('loading-overlay').style.display = 'none';
});

async function loadProfile() {
  try {
    const snap = await db.collection('drivers').doc(currentUser.uid).get();
    driverProfile = snap.exists ? snap.data() : {};
    if (driverProfile?.businessId) {
      const bSnap = await db.collection('businesses').doc(driverProfile.businessId).get();
      if (bSnap.exists) {
        currentBusiness = { id: bSnap.id, ...bSnap.data() };
        renderManage();
        return;
      }
    }
    renderSetupOptions();
  } catch (err) { console.error(err); renderSetupOptions(); }
}

// ── Create / Join options ─────────────────────────────────────────
function renderSetupOptions() {
  document.getElementById('page-content').innerHTML = `
    <div style="margin-bottom:24px">
      <h1 style="font-size:22px;font-weight:800;color:#0f172a;margin-bottom:8px">Business Team Setup</h1>
      <p style="font-size:14px;color:#64748b;line-height:1.6">
        Create a team to manage multiple drivers under one booking page, or join an existing team with an invite code.
      </p>
    </div>

    <!-- Create Business -->
    <div class="card" style="margin-bottom:16px">
      <div style="font-size:18px;font-weight:700;color:#0f172a;margin-bottom:6px">✨ Create a Business</div>
      <p style="font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.5">
        You'll become the owner and receive an invite code to share with your drivers.
      </p>
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px">Business Name *</label>
        <input type="text" id="new-biz-name" class="input-f" placeholder="e.g. Marcus Rides Fleet">
      </div>
      <div id="create-error" style="display:none;color:#EF4444;font-size:13px;margin-bottom:12px;background:#FEF2F2;padding:10px 14px;border-radius:10px"></div>
      <button onclick="createBusiness()" class="btn-primary" id="create-btn">Create Business</button>
    </div>

    <!-- Join a Team -->
    <div class="card">
      <div style="font-size:18px;font-weight:700;color:#0f172a;margin-bottom:6px">🔗 Join a Team</div>
      <p style="font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.5">
        Enter the 6-character invite code your team owner shared with you.
      </p>
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px">Invite Code *</label>
        <input type="text" id="join-code" class="input-f"
          placeholder="e.g. MR7X4K"
          maxlength="8"
          style="text-transform:uppercase;letter-spacing:.14em;font-size:20px;font-weight:700"
          oninput="this.value = this.value.toUpperCase()">
      </div>
      <div id="join-error" style="display:none;color:#EF4444;font-size:13px;margin-bottom:12px;background:#FEF2F2;padding:10px 14px;border-radius:10px"></div>
      <button onclick="joinBusiness()" class="btn-primary" id="join-btn">Join Team</button>
    </div>`;
}

// ── Manage existing business ───────────────────────────────────────
function renderManage() {
  const b       = currentBusiness;
  const isOwner = b.ownerUid === currentUser.uid;
  const members = b.members || [];
  const bookLink = `${location.origin}/business-book.html?b=${b.id}`;

  const membersHtml = members.map(m => `
    <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:#f8fafc;border-radius:12px">
      <div style="width:40px;height:40px;border-radius:50%;background:#F59E0B;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0">
        ${escHtml(initials(m.name || '?'))}
      </div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:600;color:#0f172a">${escHtml(m.name || '—')}</div>
        <div style="font-size:12px;color:#64748b">${m.role === 'owner' ? '👑 Owner' : '🚗 Driver'}</div>
      </div>
      ${isOwner && m.uid !== currentUser.uid
        ? `<button onclick="removeMember('${escHtml(m.uid)}')" style="font-size:12px;color:#EF4444;background:#FEE2E2;border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-weight:600">Remove</button>`
        : ''}
    </div>`).join('');

  document.getElementById('page-content').innerHTML = `
    <div style="margin-bottom:24px">
      <h1 style="font-size:22px;font-weight:800;color:#0f172a;margin-bottom:4px">${escHtml(b.businessName || 'My Business')}</h1>
      <div style="font-size:13px;color:#64748b">${isOwner ? '👑 You are the owner' : '🚗 You are a team driver'}</div>
    </div>

    ${isOwner ? `
    <div class="card" style="margin-bottom:16px">
      <div class="section-label">Invite Code</div>
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <div style="font-size:36px;font-weight:800;color:#0f172a;letter-spacing:.2em;
                    background:#f8fafc;border:2px solid #e2e8f0;border-radius:14px;padding:14px 20px">
          ${escHtml(b.inviteCode || '—')}
        </div>
        <div>
          <button id="copy-code-btn"
            onclick="copyToClipboard('${escHtml(b.inviteCode)}', document.getElementById('copy-code-btn'))"
            style="background:#FEF3C7;color:#92400E;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;display:block;margin-bottom:8px">
            Copy Code
          </button>
          <div style="font-size:12px;color:#94a3b8">Share with drivers to join your team</div>
        </div>
      </div>
    </div>` : ''}

    <div class="card" style="margin-bottom:16px">
      <div class="section-label">Business Booking Link</div>
      <div style="font-size:12px;color:#64748b;margin-bottom:10px">
        Share this link with riders to book with your entire team.
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <div style="flex:1;min-width:0;font-size:12px;color:#475569;background:#f8fafc;padding:10px 14px;border-radius:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          ${bookLink}
        </div>
        <button id="copy-link-btn"
          onclick="copyToClipboard('${bookLink}', document.getElementById('copy-link-btn'))"
          style="background:#DBEAFE;color:#1D4ED8;border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0">
          Copy Link
        </button>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="section-label">Team Members (${members.length})</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${membersHtml}
      </div>
    </div>

    ${!isOwner ? `
    <div class="card">
      <div style="font-size:16px;font-weight:700;color:#0f172a;margin-bottom:8px">Leave This Team</div>
      <p style="font-size:13px;color:#64748b;margin-bottom:18px;line-height:1.5">
        You'll be removed from the team and will no longer receive assigned rides from this business.
      </p>
      <button onclick="leaveBusiness()"
        style="background:#FEE2E2;color:#991B1B;border:none;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer">
        Leave Business
      </button>
    </div>` : ''}`;
}

// ── Generate random invite code ────────────────────────────────────
function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({ length: 6 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

// ── Create business ────────────────────────────────────────────────
async function createBusiness() {
  const name = document.getElementById('new-biz-name').value.trim();
  if (!name) { showErr('create-error', 'Please enter a business name.'); return; }

  const btn = document.getElementById('create-btn');
  btn.disabled = true; btn.textContent = 'Creating…';
  hideErr('create-error');

  const inviteCode  = genCode();
  const memberEntry = { uid: currentUser.uid, name: driverProfile?.name || 'Owner', role: 'owner' };

  try {
    const ref = await db.collection('businesses').add({
      ownerUid:     currentUser.uid,
      businessName: name,
      inviteCode,
      members:      [memberEntry],
      createdAt:    firebase.firestore.FieldValue.serverTimestamp(),
    });
    await db.collection('drivers').doc(currentUser.uid).update({
      businessId:   ref.id,
      businessRole: 'owner',
    });
    currentBusiness = { id: ref.id, ownerUid: currentUser.uid, businessName: name, inviteCode, members: [memberEntry] };
    renderManage();
  } catch (err) {
    showErr('create-error', 'Could not create business: ' + err.message);
    btn.disabled = false; btn.textContent = 'Create Business';
  }
}

// ── Join business with invite code ────────────────────────────────
async function joinBusiness() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!code || code.length < 4) { showErr('join-error', 'Please enter a valid invite code.'); return; }

  const btn = document.getElementById('join-btn');
  btn.disabled = true; btn.textContent = 'Joining…';
  hideErr('join-error');

  try {
    const snap = await db.collection('businesses').where('inviteCode', '==', code).limit(1).get();
    if (snap.empty) {
      showErr('join-error', 'Invite code not found. Please check and try again.');
      btn.disabled = false; btn.textContent = 'Join Team'; return;
    }

    const bizDoc = snap.docs[0];
    const biz    = bizDoc.data();

    if ((biz.members || []).some(m => m.uid === currentUser.uid)) {
      showErr('join-error', 'You are already a member of this business.');
      btn.disabled = false; btn.textContent = 'Join Team'; return;
    }

    const memberEntry = { uid: currentUser.uid, name: driverProfile?.name || 'Driver', role: 'driver' };
    const members     = [...(biz.members || []), memberEntry];

    await db.collection('businesses').doc(bizDoc.id).update({ members });
    await db.collection('drivers').doc(currentUser.uid).update({
      businessId:   bizDoc.id,
      businessRole: 'driver',
    });

    currentBusiness = { id: bizDoc.id, ...biz, members };
    renderManage();
  } catch (err) {
    showErr('join-error', 'Could not join: ' + err.message);
    btn.disabled = false; btn.textContent = 'Join Team';
  }
}

// ── Remove a team member (owner only) ─────────────────────────────
async function removeMember(memberUid) {
  if (!currentBusiness || currentBusiness.ownerUid !== currentUser.uid) return;
  if (!confirm('Remove this driver from the team?')) return;
  try {
    const members = (currentBusiness.members || []).filter(m => m.uid !== memberUid);
    await db.collection('businesses').doc(currentBusiness.id).update({ members });
    await db.collection('drivers').doc(memberUid).update({ businessId: null, businessRole: null });
    currentBusiness.members = members;
    renderManage();
  } catch (err) { alert('Could not remove member: ' + err.message); }
}

// ── Leave business (non-owner) ────────────────────────────────────
async function leaveBusiness() {
  if (!currentBusiness || !confirm('Leave this business team? This cannot be undone.')) return;
  try {
    const uid     = currentUser.uid;
    const members = (currentBusiness.members || []).filter(m => m.uid !== uid);
    await db.collection('businesses').doc(currentBusiness.id).update({ members });
    await db.collection('drivers').doc(uid).update({ businessId: null, businessRole: null });
    currentBusiness       = null;
    driverProfile.businessId   = null;
    driverProfile.businessRole = null;
    renderSetupOptions();
  } catch (err) { alert('Could not leave business: ' + err.message); }
}

// ── Error helpers ─────────────────────────────────────────────────
function showErr(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}
function hideErr(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = 'none';
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

</script>
</body>
</html>
